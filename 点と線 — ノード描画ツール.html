<title>点と線 — ノード描画ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a40;
    --node: #e8e4d4;
    --node-hover: #ffffff;
    --node-selected: #7cf0c8;
    --edge: #3a3a5c;
    --edge-active: #7cf0c8;
    --text: #c8c4b8;
    --text-dim: #5a5870;
    --accent: #7cf0c8;
    --accent2: #f07c9a;
    --font-mono: 'Space Mono', monospace;
    --font-jp: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-jp);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── ヘッダー ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 10;
    flex-shrink: 0;
  }
  header h1 {
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: .15em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .sep { width: 1px; height: 20px; background: var(--border); }

  /* ── ツールバー ── */
  .toolbar {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .tool-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    letter-spacing: .08em;
    transition: all .15s;
    border-radius: 2px;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,240,200,.08); }
  .tool-btn.danger:hover { border-color: var(--accent2); color: var(--accent2); }

  .info-bar {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .info-bar span { display: flex; gap: 4px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .dot.edge { background: var(--edge-active); border-radius: 0; transform: rotate(45deg); }

  /* ── メインエリア ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── キャンバス ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: crosshair;
  }
  #canvas-wrap.mode-select { cursor: default; }
  #canvas-wrap.mode-edge { cursor: cell; }
  #canvas-wrap.mode-pan { cursor: grab; }
  #canvas-wrap.mode-pan.panning { cursor: grabbing; }

  svg#canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* グリッド */
  .grid-line { stroke: var(--border); stroke-width: .5; opacity: .4; }

  /* エッジ */
  .edge-line {
    stroke: var(--edge);
    stroke-width: 1.5;
    fill: none;
    transition: stroke .15s;
    cursor: pointer;
  }
  .edge-line:hover { stroke: var(--edge-active); stroke-width: 2; }
  .edge-line.selected { stroke: var(--accent2); }
  .edge-temp {
    stroke: var(--accent);
    stroke-width: 1.5;
    stroke-dasharray: 4 4;
    fill: none;
    pointer-events: none;
    opacity: .7;
  }

  /* ノード */
  .node-group { cursor: pointer; }
  .node-circle {
    fill: var(--surface2);
    stroke: var(--edge);
    stroke-width: 1.5;
    transition: all .15s;
    r: 7;
  }
  .node-group:hover .node-circle {
    fill: var(--surface);
    stroke: var(--node-hover);
    r: 9;
  }
  .node-group.selected .node-circle {
    stroke: var(--node-selected);
    stroke-width: 2;
    fill: rgba(124,240,200,.1);
  }
  .node-group.connecting-from .node-circle {
    stroke: var(--accent);
    fill: rgba(124,240,200,.2);
    r: 10;
  }
  .node-label {
    font-family: var(--font-jp);
    font-size: 11px;
    font-weight: 400;
    fill: var(--text);
    pointer-events: none;
    user-select: none;
  }
  .node-label-bg {
    fill: var(--bg);
    rx: 2;
    pointer-events: none;
    opacity: .85;
  }

  /* ── サイドパネル ── */
  .panel {
    width: 240px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  .panel-title {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ノードリスト */
  .node-list { overflow-y: auto; flex: 1; }
  .node-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .12s;
    color: var(--text-dim);
  }
  .node-item:hover { background: rgba(255,255,255,.03); color: var(--text); }
  .node-item.active { border-left-color: var(--accent); color: var(--accent); background: rgba(124,240,200,.05); }
  .node-dot { width: 6px; height: 6px; border-radius: 50%; border: 1px solid currentColor; flex-shrink: 0; }
  .node-indent { margin-left: 12px; }

  /* 選択プロパティ */
  .prop-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .prop-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: .08em; }
  .prop-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-jp);
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 2px;
    outline: none;
    transition: border-color .15s;
  }
  .prop-input:focus { border-color: var(--accent); }

  /* JSON操作 */
  .json-area {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 8px;
    resize: none;
    outline: none;
    height: 120px;
    border-radius: 2px;
    line-height: 1.5;
  }
  .json-area:focus { border-color: var(--accent); }
  .btn-full {
    width: 100%;
    margin-top: 6px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 6px;
    cursor: pointer;
    transition: all .15s;
    border-radius: 2px;
    letter-spacing: .08em;
  }
  .btn-full:hover { border-color: var(--accent); color: var(--accent); }

  /* モード表示 */
  .mode-indicator {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    padding: 8px 16px;
    background: rgba(124,240,200,.04);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .mode-indicator::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .3; }
  }

  /* ショートカットヒント */
  .shortcuts {
    padding: 10px 16px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.8;
  }
  kbd {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 2px;
    font-family: var(--font-mono);
    font-size: 10px;
  }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* トースト */
  #toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);

    padding: 8px 18px;
    border-radius: 2px;
    transition: transform .25s;
    z-index: 100;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
</style>

<script>
// ─── データモデル ───────────────────────────────
let nodes = []; // { id, content, parentId, createdAt, x, y }
let edges = []; // { id, source, target }
let selectedId = null;
let edgeFrom = null;
let mode = 'select';

// ビュー変換
let vx = 0, vy = 0, vscale = 1;
let panning = false, panStart = null;

// ─── SVG要素 ───────────────────────────────────
const svg = document.getElementById('canvas');
const edgeLayer = document.getElementById('edge-layer');
const nodeLayer = document.getElementById('node-layer');
const tempEdge = document.getElementById('temp-edge');
const wrap = document.getElementById('canvas-wrap');

// ─── 座標変換 ───────────────────────────────────
function svgPoint(e) {
  const r = svg.getBoundingClientRect();
  return {
    x: (e.clientX - r.left - vx) / vscale,
    y: (e.clientY - r.top - vy) / vscale
  };
}

function toScreen(x, y) {
  return { x: x * vscale + vx, y: y * vscale + vy };
}

// ─── モード管理 ─────────────────────────────────
function setMode(m) {
  mode = m;
  edgeFrom = null;
  tempEdge.style.display = 'none';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m)?.classList.add('active');
  wrap.className = 'mode-' + m;
  const labels = { select: 'SELECT MODE', node: 'NODE ADD MODE — クリックで配置', edge: 'EDGE MODE — 始点をクリック', pan: 'PAN MODE' };
  document.getElementById('mode-label').textContent = labels[m] || m.toUpperCase();
  if (m !== 'select') { selectedId = null; renderAll(); }
  updatePanel();
}

// ─── ID生成 ─────────────────────────────────────
function genId() { return 'N' + Date.now(); }

// ─── ノード追加 ──────────────────────────────────
function addNode(x, y, data = {}) {
  const now = new Date();
  const hms = now.toTimeString().slice(0, 8);
  const node = {
    id: data.id || genId(),
    content: data.content || '新規ノード',
    parentId: data.parentId || null,
    createdAt: data.createdAt || hms,
    x: x,
    y: y
  };
  nodes.push(node);

  // 親があればエッジ追加
  if (node.parentId) {
    const parent = nodes.find(n => n.id === node.parentId);
    if (parent) addEdge(node.parentId, node.id);
  }

  renderNode(node);
  updateCounts();
  updateNodeList();
  return node;
}

// ─── エッジ追加 ──────────────────────────────────
function addEdge(src, tgt) {
  if (src === tgt) return;
  if (edges.find(e => e.source === src && e.target === tgt)) return;
  const e = { id: 'E' + Date.now(), source: src, target: tgt };
  edges.push(e);
  renderEdge(e);
  updateCounts();
  return e;
}

// ─── レンダリング ────────────────────────────────
function renderAll() {
  edgeLayer.innerHTML = '';
  nodeLayer.innerHTML = '';
  edges.forEach(renderEdge);
  nodes.forEach(renderNode);
}

function renderNode(node) {
  const old = document.getElementById('ng-' + node.id);
  if (old) old.remove();

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'ng-' + node.id;
  g.setAttribute('class', 'node-group' + (selectedId === node.id ? ' selected' : '') + (edgeFrom === node.id ? ' connecting-from' : ''));
  g.setAttribute('transform', `translate(${node.x},${node.y})`);

  // 円
  const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  c.setAttribute('class', 'node-circle');
  c.setAttribute('cx', 0); c.setAttribute('cy', 0); c.setAttribute('r', 7);
  g.appendChild(c);

  // ラベル背景
  const textLen = node.content.length * 7 + 8;
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('class', 'node-label-bg');
  bg.setAttribute('x', 12); bg.setAttribute('y', -9);
  bg.setAttribute('width', textLen); bg.setAttribute('height', 16);
  bg.setAttribute('rx', 2);
  g.appendChild(bg);

  // ラベル
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('class', 'node-label');
  txt.setAttribute('x', 14); txt.setAttribute('y', 3);
  txt.textContent = node.content;
  g.appendChild(txt);

  // イベント
  g.addEventListener('mousedown', e => onNodeMouseDown(e, node));
  g.addEventListener('mouseenter', () => {
    if (mode === 'edge' && edgeFrom && edgeFrom !== node.id) {
      g.style.cursor = 'crosshair';
    }
  });

  nodeLayer.appendChild(g);
}

function renderEdge(edge) {
  const old = document.getElementById('eg-' + edge.id);
  if (old) old.remove();

  const src = nodes.find(n => n.id === edge.source);
  const tgt = nodes.find(n => n.id === edge.target);
  if (!src || !tgt) return;

  const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  line.id = 'eg-' + edge.id;
  line.setAttribute('class', 'edge-line' + (selectedId === edge.id ? ' selected' : ''));
  line.setAttribute('x1', src.x); line.setAttribute('y1', src.y);
  line.setAttribute('x2', tgt.x); line.setAttribute('y2', tgt.y);
  line.setAttribute('data-id', edge.id);

  line.addEventListener('mousedown', ev => {
    if (mode !== 'select') return;
    ev.stopPropagation();
    selectedId = edge.id;
    renderAll();
    updatePanel(edge, 'edge');
    updateNodeList();
  });

  edgeLayer.appendChild(line);
}

function refreshEdgesForNode(nodeId) {
  edges.forEach(e => {
    if (e.source === nodeId || e.target === nodeId) renderEdge(e);
  });
}

// ─── ノードマウスイベント ─────────────────────────
let dragging = null, dragOffset = null;

function onNodeMouseDown(e, node) {
  e.stopPropagation();
  if (mode === 'edge') {
    if (!edgeFrom) {
      edgeFrom = node.id;
      document.getElementById('ng-' + node.id)?.classList.add('connecting-from');
      document.getElementById('mode-label').textContent = 'EDGE MODE — 終点をクリック';
      tempEdge.style.display = '';
      tempEdge.setAttribute('x1', node.x); tempEdge.setAttribute('y1', node.y);
      tempEdge.setAttribute('x2', node.x); tempEdge.setAttribute('y2', node.y);
    } else if (edgeFrom !== node.id) {
      addEdge(edgeFrom, node.id);
      // parentId設定
      const tgt = nodes.find(n => n.id === node.id);
      if (tgt && !tgt.parentId) { tgt.parentId = edgeFrom; }
      edgeFrom = null;
      tempEdge.style.display = 'none';
      document.querySelectorAll('.connecting-from').forEach(el => el.classList.remove('connecting-from'));
      document.getElementById('mode-label').textContent = 'EDGE MODE — 始点をクリック';
      renderAll();
      updateNodeList();
    }
    return;
  }
  if (mode === 'select') {
    selectedId = node.id;
    renderAll();
    updatePanel(node, 'node');
    updateNodeList();
    dragging = node;
    const p = svgPoint(e);
    dragOffset = { x: p.x - node.x, y: p.y - node.y };
  }
}

// ─── キャンバスイベント ───────────────────────────
svg.addEventListener('mousemove', e => {
  const p = svgPoint(e);
  if (mode === 'edge' && edgeFrom) {
    tempEdge.setAttribute('x2', p.x); tempEdge.setAttribute('y2', p.y);
  }
  if (dragging) {
    dragging.x = p.x - dragOffset.x;
    dragging.y = p.y - dragOffset.y;
    const g = document.getElementById('ng-' + dragging.id);
    if (g) g.setAttribute('transform', `translate(${dragging.x},${dragging.y})`);
    refreshEdgesForNode(dragging.id);
  }
  if (panning && panStart) {
    vx += e.clientX - panStart.x;
    vy += e.clientY - panStart.y;
    panStart = { x: e.clientX, y: e.clientY };
    applyViewTransform();
  }
});

svg.addEventListener('mouseup', e => {
  dragging = null; dragOffset = null;
  if (panning) { panning = false; wrap.classList.remove('panning'); }
});

wrap.addEventListener('mousedown', e => {
  if (mode === 'node') {
    const p = svgPoint(e);
    const node = addNode(p.x, p.y);
    selectedId = node.id;
    updatePanel(node, 'node');
    updateNodeList();
    renderAll();
    return;
  }
  if (mode === 'pan') {
    panning = true;
    panStart = { x: e.clientX, y: e.clientY };
    wrap.classList.add('panning');
    return;
  }
  if (mode === 'select' && e.target === svg || e.target.closest('#grid-layer')) {
    selectedId = null;
    renderAll();
    updatePanel();
    updateNodeList();
  }
});

// ホイールズーム
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? .9 : 1.1;
  const r = svg.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  vx = mx - (mx - vx) * delta;
  vy = my - (my - vy) * delta;
  vscale = Math.max(.2, Math.min(4, vscale * delta));
  applyViewTransform();
}, { passive: false });

function applyViewTransform() {
  nodeLayer.setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
  edgeLayer.setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
  tempEdge.setAttribute('transform', `translate(${vx},${vy}) scale(${vscale})`);
}

// ─── パネル更新 ──────────────────────────────────
function updatePanel(item, type) {
  const sec = document.getElementById('prop-section');
  if (!item) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  document.getElementById('prop-id').textContent = item.id;
  if (type === 'node') {
    document.getElementById('prop-content-row').style.display = '';
    document.getElementById('prop-parent-row').style.display = '';
    document.getElementById('prop-content').value = item.content;
    document.getElementById('prop-parent').textContent = item.parentId || '—';
  } else {
    document.getElementById('prop-content-row').style.display = 'none';
    document.getElementById('prop-parent-row').style.display = 'none';
    document.getElementById('prop-parent').textContent = item.source + ' → ' + item.target;
  }
}

function updateNodeContent(val) {
  const node = nodes.find(n => n.id === selectedId);
  if (!node) return;
  node.content = val;
  renderNode(node);
  updateNodeList();
}

function updateCounts() {
  document.getElementById('node-count').textContent = nodes.length;
  document.getElementById('edge-count').textContent = edges.length;
}

function updateNodeList() {
  const list = document.getElementById('node-list');
  list.innerHTML = '';
  nodes.forEach(node => {
    const div = document.createElement('div');
    div.className = 'node-item' + (selectedId === node.id ? ' active' : '') + (node.parentId ? ' node-indent' : '');
    div.innerHTML = `<span class="node-dot"></span><span>${node.content}</span>`;
    div.onclick = () => {
      selectedId = node.id;
      renderAll();
      updatePanel(node, 'node');
      updateNodeList();
    };
    list.appendChild(div);
  });
}

// ─── 削除 ────────────────────────────────────────
function deleteSelected() {
  if (!selectedId) return;
  // エッジ削除?
  const eIdx = edges.findIndex(e => e.id === selectedId);
  if (eIdx !== -1) {
    edges.splice(eIdx, 1);
    selectedId = null; renderAll(); updateCounts(); updateNodeList(); return;
  }
  // ノード削除
  const nIdx = nodes.findIndex(n => n.id === selectedId);
  if (nIdx !== -1) {
    nodes.splice(nIdx, 1);
    // 関連エッジも削除
    edges = edges.filter(e => e.source !== selectedId && e.target !== selectedId);
    selectedId = null; renderAll(); updateCounts(); updatePanel(); updateNodeList();
  }
}

function clearAll() {
  if (!confirm('全て削除しますか？')) return;
  nodes = []; edges = []; selectedId = null;
  renderAll(); updateCounts(); updatePanel(); updateNodeList();
}

// ─── JSON インポート/エクスポート ─────────────────
function importJSON() {
  const raw = document.getElementById('json-area').value.trim();
  if (!raw) return;
  let data;
  try { data = JSON.parse(raw); } catch { toast('JSON パースエラー'); return; }
  if (!Array.isArray(data)) { toast('配列形式のJSONが必要です'); return; }

  nodes = []; edges = []; selectedId = null;
  edgeLayer.innerHTML = ''; nodeLayer.innerHTML = '';

  // 仕様通りのフィールドを読み込み: id, content, parentId, createdAt
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const roots = data.filter(d => !d.parentId);
  const children = data.filter(d => d.parentId);

  // ルートノードを横並び
  const allIds = data.map(d => d.id);
  const positioned = {};

  // ルートを上部に等間隔配置
  roots.forEach((d, i) => {
    const x = 80 + i * 220;
    const y = 100;
    positioned[d.id] = { x, y };
  });

  // 子を親の下に配置（BFS）
  let queue = [...roots];
  let visited = new Set(roots.map(r => r.id));
  while (queue.length) {
    const par = queue.shift();
    const kids = children.filter(c => c.parentId === par.id);
    kids.forEach((kid, i) => {
      if (!positioned[kid.id]) {
        const px = positioned[par.id]?.x || 100;
        const py = positioned[par.id]?.y || 100;
        positioned[kid.id] = { x: px + (i - (kids.length - 1) / 2) * 160, y: py + 120 };
      }
      if (!visited.has(kid.id)) { visited.add(kid.id); queue.push(kid); }
    });
  }

  // 位置が決まっていないノードを配置
  data.forEach((d, i) => {
    if (!positioned[d.id]) positioned[d.id] = { x: 100 + (i % 5) * 160, y: 80 + Math.floor(i / 5) * 120 };
  });

  // ノード追加（エッジなしで）
  data.forEach(d => {
    const pos = positioned[d.id] || { x: 100, y: 100 };
    nodes.push({
      id: d.id,
      content: d.content,
      parentId: d.parentId || null,
      createdAt: d.createdAt || '',
      x: pos.x,
      y: pos.y
    });
  });

  // エッジ追加（parentIdから）
  nodes.forEach(node => {
    if (node.parentId) addEdge(node.parentId, node.id);
  });

  renderAll();
  updateCounts();
  updateNodeList();
  toast('インポート完了 — ' + nodes.length + ' nodes');
}

function exportJSON() {
  const data = nodes.map(n => ({
    id: n.id,
    content: n.content,
    parentId: n.parentId,
    createdAt: n.createdAt
  }));
  const json = JSON.stringify(data, null, 2);
  document.getElementById('json-area').value = json;

  // クリップボードへ
  navigator.clipboard?.writeText(json).then(() => toast('JSONをクリップボードにコピー'));
}

// ─── トースト ─────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── キーボード ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 's' || e.key === 'S') setMode('select');
  if (e.key === 'n' || e.key === 'N') setMode('node');
  if (e.key === 'e' || e.key === 'E') setMode('edge');
  if (e.key === ' ') { e.preventDefault(); setMode('pan'); }
  if (e.key === 'Escape') {
    edgeFrom = null; tempEdge.style.display = 'none';
    document.querySelectorAll('.connecting-from').forEach(el => el.classList.remove('connecting-from'));
    if (mode === 'edge') document.getElementById('mode-label').textContent = 'EDGE MODE — 始点をクリック';
    if (mode === 'pan') setMode('select');
  }
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
});
